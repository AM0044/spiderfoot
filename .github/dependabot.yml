# Dependabot configuration
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # --- Python dependencies: root -----------------------------------------
  # requirements.txt (runtime dependencies). This is the ONLY block that
  # tracks these packages — /test and /test/acceptance both pull them in
  # via "-r ../requirements.txt" rather than declaring their own copies,
  # so scanning all three directories for them was generating 3 duplicate
  # PRs per package. Root stays unrestricted; the other two blocks below
  # are now limited to the packages that are actually unique to them.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      python-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # --- Python dependencies: /test -----------------------------------------
  # test/requirements.txt — only these packages are actually declared here;
  # everything else in the file comes from the root include above.
  - package-ecosystem: "pip"
    directory: "/test"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    allow:
      - dependency-name: "dlint"
      - dependency-name: "flake8"
      - dependency-name: "flake8-blind-except"
      - dependency-name: "flake8-bugbear"
      - dependency-name: "flake8-builtins"
      - dependency-name: "flake8-quotes"
      - dependency-name: "flake8-sfs"
      - dependency-name: "flake8-simplify"
      - dependency-name: "pytest"
      - dependency-name: "pytest-cov"
      - dependency-name: "pytest-mock"
      - dependency-name: "pytest-xdist"
      - dependency-name: "responses"
    groups:
      python-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # --- Python dependencies: /test/acceptance ------------------------------
  # test/acceptance/requirements.txt — same story, only robotframework
  # packages are unique to this file.
  - package-ecosystem: "pip"
    directory: "/test/acceptance"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    allow:
      - dependency-name: "robotframework"
      - dependency-name: "robotframework-seleniumlibrary"
    groups:
      python-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # --- GitHub Actions --------------------------------------------------------
  # Keeps the SHA-pinned actions in .github/workflows/ current. Dependabot
  # updates the pinned commit SHA and the trailing "# vX" comment together,
  # so you keep the security of SHA pinning without manual maintenance.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      github-actions:
        update-types:
          - "minor"
          - "patch"
