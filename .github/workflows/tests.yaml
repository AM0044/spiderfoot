name: Tests

on:
  push:
    branches: master
  pull_request:
    branches: master

# Minimal default token permissions (Scorecard: Token-Permissions).
permissions:
  contents: read

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # NOTE: 3.7 and 3.8 are end-of-life and are NOT available on current
        # ubuntu-latest runners, which was breaking CI. Original matrix was
        # ["3.7", "3.8", "3.9", "3.10"]. Adjust this to whatever Python range
        # this fork officially supports (keep it in sync with the README badge).
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-latest, macos-latest]

    steps:
      # Actions pinned to full commit SHA (Scorecard: Pinned-Dependencies)
      # and upgraded from deprecated Node-16 majors.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          # These pip installs are still unpinned (Scorecard alerts #24-26).
          # Full resolution requires hash-pinning; deferred as low priority
          # for dev-only CI.
          python -m pip install --upgrade pip
          pip install flake8 pytest
          pip install -r test/requirements.txt
      - name: Lint with flake8
        run: |
          # stop the build if there are Python Flake8 violations
          flake8 . --count --show-source --statistics
      - name: Test with pytest
        run: |
          python -m pytest -n auto --dist loadfile --ignore=test/integration/modules/ --durations=5 --cov-report term --cov=. .
      - uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5
        with:
          fail_ci_if_error: false
          verbose: true
