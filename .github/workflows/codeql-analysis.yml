name: "CodeQL"

on:
  push:
    branches:
      - master
  schedule:
    - cron: "26 16 * * 0"

# Top-level minimal permissions (Scorecard: Token-Permissions).
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    # CodeQL needs these to read the workflow and upload results.
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: true
      matrix:
        language: ["python"]
    steps:
      # Pinned to SHA (Scorecard: Pinned-Dependencies) and upgraded from the
      # retired codeql-action@v1 (disabled by GitHub in 2023 -> failing runs).
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Initialize CodeQL
        uses: github/codeql-action/init@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v3
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v3
