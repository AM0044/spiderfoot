name: "CodeQL"

on:
  push:
    branches:
      - master
  schedule:
    - cron: "26 16 * * 0"

# Top-level minimal permissions (Scorecard: Token-Permissions).
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    # CodeQL needs these to read the workflow and upload results.
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: true
      matrix:
        language: ["python"]
    steps:
      # Pinned to SHA (Scorecard: Pinned-Dependencies) and upgraded from the
      # retired codeql-action@v1 (disabled by GitHub in 2023 -> failing runs).
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@411c4c9a36b3fca4d674f06b6396b2c6d23522c6 # v3
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@411c4c9a36b3fca4d674f06b6396b2c6d23522c6 # v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v3
