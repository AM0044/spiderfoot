# OpenSSF Scorecard for a PUBLIC repo.
#
# Uses the official Scorecard Action: runs the checks, publishes the result to
# the public scorecard.dev viewer, and powers the README badge. No personal
# access token needed — publishing uses a short-lived OIDC token.
#
# Actions are pinned to commit SHAs (version in the comment) so Dependabot can
# bump them safely.
name: OpenSSF Scorecard

on:
  branch_protection_rule:      # re-score when branch protection changes
  schedule:
    - cron: "0 7 * * 2"        # Tuesdays 07:00 UTC
  push:
    branches: [ master ]       # <-- your default branch (change if not master)

# Read-only at the workflow level (required by the publish API).
permissions: {}

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload results to Security > Code scanning
      id-token: write          # OIDC token that authenticates the published result
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true   # backs the badge + public viewer

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 90

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: results.sarif
