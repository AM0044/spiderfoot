# OpenSSF Scorecard — automated security-health scoring + badge.
#
# This MUST be a standalone workflow. When publish_results: true (required for
# the badge), the Scorecard API rejects workflows that have top-level env vars,
# workflow-level write permissions, or non-approved actions — so it cannot be
# merged into the SSCV/osv-scanner workflow.
#
# Actions are pinned to full commit SHAs (with version comments so Dependabot
# can bump them). Verify/refresh pins from each action's releases page.
name: OpenSSF Scorecard

on:
  # Re-score when branch protection changes (a Scorecard input), weekly, and on
  # pushes to the default branch. Publishing only supports push + schedule on
  # the default branch.
  branch_protection_rule:
  schedule:
    - cron: "0 7 * * 2"   # Tuesdays 07:00 UTC
  push:
    branches: [ main ]    # <-- set to your default branch if not "main"

# Read-only at the workflow level (required by the publish API).
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # upload SARIF to the Security > Code scanning tab
      id-token: write          # OIDC token proving result authenticity (badge)
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Publishing is what backs the README badge and feeds the public
          # scorecard.dev viewer. Set to false if you do NOT want results public.
          publish_results: true

      # Keep the raw results as a downloadable artifact (audit trail).
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 90

      # Surface findings in Security > Code scanning alerts, each with a fix hint.
      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
